<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#f4f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Store Time Machine">
<title>Store Time Machine</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="styles.css?v=18">
</head>
<body>

<div id="map"></div>

<header id="topbar">
  <a class="brand" href="" aria-label="Store Time Machine">
    <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10.2" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.45"/>
      <circle cx="12" cy="12" r="5.6"  fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.85"/>
      <circle cx="12" cy="1.8" r="2.2" fill="#E30613"/>
      <circle cx="22.2" cy="12" r="2.2" fill="#1a1a1a"/>
      <circle cx="12" cy="22.2" r="2.0" fill="currentColor" opacity="0.30"/>
      <circle cx="1.8" cy="12" r="2.0" fill="currentColor" opacity="0.55"/>
      <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
      <path d="M12 12 L12 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><span class="wm-1">Time</span><span class="wm-2">Machine</span></span>
  </a>
  <div id="retailers" role="tablist" aria-label="Retailers"></div>
  <details class="nav-menu" id="nav-menu">
    <summary aria-label="Menu">⋯</summary>
    <ul>
      <li><a href="index.html" class="current">Map</a></li>
      <li><a href="dashboard.html">Stats</a></li>
      <li><a href="team.html">Team</a></li>
      <li><a href="notes.html">Notes</a></li>
    </ul>
  </details>
</header>

<div id="chips" aria-label="Stores in view"></div>

<footer id="bottombar">
  <button id="playpause" aria-label="Play time-lapse">▶</button>
  <div class="slider-wrap">
    <input id="year-slider" type="range" min="2000" max="2026" value="2026" step="1" aria-label="Year">
    <div class="slider-labels"><span id="year-min">2000</span><span id="year-max">2026</span></div>
  </div>
  <span id="year-display">2026</span>
</footer>

<div id="sheet-backdrop" class="hidden" aria-hidden="true"></div>

<aside id="manifest" class="sheet hidden" role="dialog" aria-label="Store list" aria-hidden="true">
  <div class="sheet-handle" aria-hidden="true"></div>
  <header class="sheet-header">
    <div>
      <div class="sheet-title" id="manifest-title">—</div>
      <div class="sheet-sub" id="manifest-sub"></div>
    </div>
    <button class="sheet-close" data-close="manifest" aria-label="Close">×</button>
  </header>
  <div id="manifest-list"></div>
</aside>

<aside id="detail" class="sheet hidden" role="dialog" aria-label="Store details" aria-hidden="true">
  <div class="sheet-handle" aria-hidden="true"></div>
  <header class="sheet-header">
    <button class="sheet-back hidden" id="detail-back" aria-label="Back">‹</button>
    <div class="detail-retailer" id="detail-retailer"></div>
    <button class="sheet-close" data-close="detail" aria-label="Close">×</button>
  </header>
  <div id="detail-body"></div>
</aside>

<div id="loading">Loading store data…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js?v=18"></script>
<script>
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('nav-menu');
    if (menu && !menu.contains(e.target) && menu.open) menu.open = false;
  });
</script>
</body>
</html>
