<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#0b0d10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LDM Locate">
<title>LDM Locate</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="map"></div>

<header id="topbar">
  <div class="brand">LDM</div>
  <div id="retailers" role="tablist" aria-label="Retailers"></div>
</header>

<div id="hud-stats" aria-live="polite">
  <span class="hud-label">Active fleet</span>
  <span id="active-count">—</span>
</div>

<footer id="bottombar">
  <button id="playpause" aria-label="Play time-lapse">▶</button>
  <div class="slider-wrap">
    <input id="year-slider" type="range" min="2000" max="2026" value="2026" step="1" aria-label="Year">
    <div class="slider-labels"><span id="year-min">2000</span><span id="year-max">2026</span></div>
  </div>
  <span id="year-display">2026</span>
</footer>

<div id="detail-backdrop" class="hidden" aria-hidden="true"></div>
<aside id="detail" class="hidden" role="dialog" aria-label="Store details" aria-hidden="true">
  <div id="detail-handle" aria-hidden="true"></div>
  <button id="detail-close" aria-label="Close">×</button>
  <div id="detail-body"></div>
</aside>

<div id="loading">Loading store data…</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
