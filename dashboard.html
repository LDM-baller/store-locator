<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Store Time Machine">
<title>Analytics — Store Time Machine</title>
<link rel="stylesheet" href="styles.css?v=14">
<link rel="stylesheet" href="dashboard.css?v=14">
</head>
<body class="dash">

<header id="topbar">
  <a class="brand" href="index.html" aria-label="Store Time Machine">
    <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10.2" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.45"/>
      <circle cx="12" cy="12" r="5.6"  fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.85"/>
      <circle cx="12" cy="1.8" r="2.2" fill="#E30613"/>
      <circle cx="22.2" cy="12" r="2.2" fill="#1a1a1a"/>
      <circle cx="12" cy="22.2" r="2.0" fill="currentColor" opacity="0.30"/>
      <circle cx="1.8" cy="12" r="2.0" fill="currentColor" opacity="0.55"/>
      <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
      <path d="M12 12 L12 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><span class="wm-1">Time</span><span class="wm-2">Machine</span></span>
  </a>
  <div id="retailers" role="tablist" aria-label="Retailers"></div>
  <a class="nav-toggle" href="index.html" aria-label="View map">Map</a>
</header>

<main id="dash-main">
  <section class="card card-headline">
    <div class="card-title">Snapshot</div>
    <div id="headline" class="headline-grid"></div>
  </section>

  <section class="card">
    <div class="card-title">Fleet over time</div>
    <div class="card-sub" id="fleet-sub">cumulative active stores</div>
    <div id="chart-fleet" class="chart"></div>
  </section>

  <section class="card">
    <div class="card-title">Openings per year</div>
    <div class="card-sub">new stores added each year</div>
    <div id="chart-annual" class="chart"></div>
  </section>

  <section class="card">
    <div class="card-title">Top markets</div>
    <div class="card-sub">stores by country (top 10)</div>
    <div id="chart-markets" class="chart"></div>
  </section>

  <section class="card">
    <div class="card-title">Store type mix</div>
    <div class="card-sub">composition of the active fleet</div>
    <div id="chart-types" class="chart"></div>
  </section>

  <section class="card">
    <div class="card-title">Year snapshot</div>
    <div class="card-sub">all retailers at a chosen year</div>
    <div class="snapshot-controls">
      <input id="snap-year-slider" type="range" min="2000" max="2026" value="2026" step="1">
      <span id="snap-year-display" class="year-readout">2026</span>
    </div>
    <div id="snap-grid" class="snap-grid"></div>
  </section>
</main>

<div id="loading">Loading…</div>

<script src="dashboard.js?v=14"></script>
</body>
</html>
