<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f4f5f7">
<title>Team — Store Time Machine</title>
<link rel="stylesheet" href="styles.css?v=18">
<link rel="stylesheet" href="team.css?v=18">
</head>
<body class="team">

<header id="topbar">
  <a class="brand" href="index.html" aria-label="Store Time Machine">
    <svg class="logo-mark" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="10.2" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.45"/>
      <circle cx="12" cy="12" r="5.6"  fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.85"/>
      <circle cx="12" cy="1.8" r="2.2" fill="#E30613"/>
      <circle cx="22.2" cy="12" r="2.2" fill="#1a1a1a"/>
      <circle cx="12" cy="22.2" r="2.0" fill="currentColor" opacity="0.30"/>
      <circle cx="1.8" cy="12" r="2.0" fill="currentColor" opacity="0.55"/>
      <circle cx="12" cy="12" r="1.4" fill="currentColor"/>
      <path d="M12 12 L12 5.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span class="wordmark"><span class="wm-1">Time</span><span class="wm-2">Machine</span></span>
  </a>
  <div style="flex:1"></div>
  <details class="nav-menu" id="nav-menu">
    <summary aria-label="Menu">⋯</summary>
    <ul>
      <li><a href="index.html">Map</a></li>
      <li><a href="dashboard.html">Stats</a></li>
      <li><a href="team.html" class="current">Team</a></li>
      <li><a href="notes.html">Notes</a></li>
    </ul>
  </details>
</header>

<main id="team-main">
  <header class="team-header">
    <h1>Alo Yoga — Leadership</h1>
    <p class="lede" id="team-lede">Loading…</p>
  </header>

  <section class="team-filters" id="team-filters">
    <div class="filter-group">
      <label>Function</label>
      <div class="chips" id="filter-functions"></div>
    </div>
    <div class="filter-group">
      <label>Joined Alo</label>
      <div class="chips" id="filter-years"></div>
    </div>
    <div class="filter-group">
      <label>Came from</label>
      <div class="chips" id="filter-prior"></div>
    </div>
  </section>

  <section id="roster-grid" class="roster-grid"></section>
</main>

<div id="sheet-backdrop" class="hidden" aria-hidden="true"></div>
<aside id="person-detail" class="sheet hidden" role="dialog" aria-label="Person details" aria-hidden="true">
  <div class="sheet-handle" aria-hidden="true"></div>
  <header class="sheet-header">
    <div>
      <div class="sheet-title" id="person-name">—</div>
      <div class="sheet-sub" id="person-title"></div>
    </div>
    <button class="sheet-close" aria-label="Close" id="person-close">×</button>
  </header>
  <div id="person-body"></div>
</aside>

<div id="loading">Loading…</div>

<script src="team.js?v=18"></script>
</body>
</html>
